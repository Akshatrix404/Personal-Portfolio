<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Akshat Khandelwal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #f7f9ff;
    --surface: #ffffff;
    --border:  rgba(15,23,42,0.08);
    --text:    #0f172a;
    --muted:   rgba(15,23,42,0.55);
    --accent:  #2563eb;
    --aqua:    #0ea5e9;
    --gold:    #f59e0b;
    --r:       14px;
  }

  html, body {
    height: 100%;
    background: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }

  /* ── Noise grain overlay ── */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03' fill='%230f172a'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.55;
  }

  /* ── Ambient glow ── */
  body::after {
    content: "";
    position: fixed;
    top: -30vh; left: 50%;
    transform: translateX(-50%);
    width: 80vw; height: 80vw;
    background: radial-gradient(ellipse, rgba(124,106,247,0.13) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout ── */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    gap: 0;
  }

  /* ── Avatar ── */
  .avatar-ring {
    position: relative;
    width: 108px; height: 108px;
    flex-shrink: 0;
    animation: fadeUp 0.7s ease both;
  }
  .avatar-ring::before {
    content: "";
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--accent), var(--aqua), var(--gold), var(--accent));
    animation: spin 8s linear infinite;
    z-index: 0;
  }
  .avatar-inner {
    position: relative;
    z-index: 1;
    width: 100%; height: 100%;
    border-radius: 50%;
    background: #f8fafc;
    border: 3px solid rgba(37,99,235,0.12);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -0.02em;
    overflow: hidden;
  }
  .avatar-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    display: block;
  }

  /* ── Name block ── */
  .name-block {
    text-align: center;
    margin-top: 22px;
    animation: fadeUp 0.7s 0.1s ease both;
  }
  .name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 7vw, 4.2rem);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #f0eeff 0%, var(--accent) 55%, var(--aqua) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .tagline {
    margin-top: 10px;
    font-size: 0.82rem;
    font-weight: 300;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .tagline span {
    color: var(--aqua);
    opacity: 0.85;
  }

  /* ── Divider ── */
  .divider {
    width: 48px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 28px 0;
    animation: fadeUp 0.7s 0.2s ease both;
  }

  /* ── Links grid ── */
  .links {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    gap: 14px;
    width: auto;
    max-width: 100%;
    animation: fadeUp 0.7s 0.25s ease both;
    margin-top: 24px;
  }

  .card {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 16px;
    min-width: 52px;
    min-height: 52px;
    border-radius: 15px;
    background: var(--surface);
    border: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    font-size: 0.875rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: background 0.22s, border-color 0.22s, transform 0.18s, box-shadow 0.22s;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.22s;
    border-radius: inherit;
  }
  .card:hover {
    transform: translateY(-2px);
    border-color: rgba(37,99,235,0.22);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
  }
  .card:active { transform: translateY(0); }

  /* Card accent colours via CSS custom props */
  .card:hover::before { opacity: 1; }

  .card.portfolio {
    width: auto;
    min-width: auto;
    padding: 15px 24px;
    background: linear-gradient(135deg, rgba(37,99,235,0.16), rgba(14,165,233,0.12));
    border-color: rgba(37,99,235,0.25);
  }
  .card.portfolio:hover {
    background: linear-gradient(135deg, rgba(37,99,235,0.24), rgba(14,165,233,0.18));
    border-color: rgba(37,99,235,0.45);
    box-shadow: 0 14px 30px rgba(37,99,235,0.12);
  }

  .card.github:hover  { border-color: rgba(255,255,255,0.25); box-shadow: 0 12px 32px rgba(0,0,0,0.5); }
  .card.linkedin:hover{ border-color: rgba(255,255,255,0.25);  box-shadow: 0 12px 32px rgba(0,0,0,0.5); }
  .card.email:hover   { border-color: rgba(255,255,255,0.25); box-shadow: 0 12px 32px rgba(0,0,0,0.5); }
  .card.whatsapp:hover{ border-color: rgba(255,255,255,0.25);  box-shadow: 0 12px 32px rgba(0,0,0,0.5);; }

  /* Icon circle */
  .icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 1.05rem;
  }
  .icon svg { width: 18px; height: 18px; }
  .portfolio .icon { background: rgba(124,106,247,0.22); }
  .github   .icon  { background: rgba(62, 60, 60, 0.08); }
  .linkedin .icon  { background: rgba(10,102,194,0.18); }
  .email    .icon  { background: rgba(232,201,122,0.14); }
  .whatsapp .icon  { background: rgba(37,211,102,0.14); }

  .card-text { display: flex; flex-direction: column; gap: 1px; }
  .card-label { font-size: 0.82rem; color: var(--muted); font-weight: 300; letter-spacing: 0.04em; }
  .card-value { font-size: 0.92rem; font-weight: 500; }

  /* Arrow on portfolio */
  .card.portfolio .arrow {
    margin-left: 8px;
    color: var(--accent);
    opacity: 0.75;
    font-size: 1rem;
    transition: transform 0.2s, opacity 0.2s;
  }
  .card.portfolio:hover .arrow { transform: translateX(3px); opacity: 1; }

  /* ── Status badge ── */
  .status {
    margin-top: 28px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: 99px;
    background: rgba(37,99,235,0.08);
    border: 1px solid rgba(37,99,235,0.16);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
    animation: fadeUp 0.7s 0.35s ease both;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--aqua);
    animation: pulse 2s ease-in-out infinite;
  }

  /* ── Footer note ── */
  .footer-note {
    margin-top: 36px;
    font-size: 0.7rem;
    color: rgba(15,23,42,0.45);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    animation: fadeUp 0.7s 0.4s ease both;
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(0.85); }
  }

  /* ── Mobile tweaks ── */
  @media (max-width: 400px) {
    .links { justify-content: center; gap: 12px; }
    .card { min-width: 50px; }
  }
</style>
</head>
